[project]
site_name = "twig"
site_description = "A better git experience — opinionated workflows, built-in TUI, git passthrough"
site_url = "https://twig.anadinema.dev/"
repo_url = "https://github.com/anadinema/twig"
repo_name = "anadinema/twig"
site_author = "Anadi Nema"
copyright = """
&copy; 2026 Anadi Nema
"""
docs_dir = "docs"
site_dir = "site"

nav = [
    { "Home" = "index.md" },
    { "Getting Started" = [
        { "Install" = "install.md" },
        { "Quickstart" = "quickstart.md" }
    ] },
    { "Configuration" = [
        { "Overview" = "config/overview.md" },
        { "Reference" = "config/reference.md" },
        { "Examples" = [
            { "Minimal" = "config/examples/minimal.md" },
            { "Full" = "config/examples/full.md" }
        ] }
    ] },
    { "Commands" = [
        { "Overview" = "commands/index.md" },
        { "Subcommands" = [
            { "goto" = "commands/goto.md" },
            { "save" = "commands/save.md" },
            { "push" = "commands/push.md" },
            { "root" = "commands/root.md" },
            { "prune" = "commands/prune.md" }
        ] }
    ] },
    { "Guides" = [
        { "Windows (Git Bash)" = "guides/windows-git-bash.md" },
        { "Shell Integration" = "guides/shell-integration.md" },
        { "Conventional Commits" = "guides/conventional-commits.md" },
        { "Jira Integration" = "guides/jira.md" },
        { "Migrating from Shell Functions" = "guides/migrating.md" }
    ] }
]

[project.theme]
variant = "modern"
language = "en"
logo = "assets/twig.png"
favicon = "assets/twig.ico"
font.text = "Poppins"
font.code = "JetBrains Mono"

features = [
    "navigation.sections",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.sections",
    "navigation.expand",
    "navigation.path",
    "navigation.top",
    "search.highlight",
    "content.code.copy",
    "content.code.select",
    "content.code.annotate",
    "content.action.edit",
    "content.tooltips",
    "toc.follow"
]

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "material/pencil"

[project.extra.version]
provider = "mike"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"
primary = "green"
accent = "light green"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "green"
accent = "light green"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
primary = "green"
accent = "light green"

[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = "mailto:anadi.nema@outlook.com"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/anadinema"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/anadinema"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
